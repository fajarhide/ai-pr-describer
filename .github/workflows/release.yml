name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/ai-pr-describer-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/ai-pr-describer-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/ai-pr-describer-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/ai-pr-describer-darwin-arm64 .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
